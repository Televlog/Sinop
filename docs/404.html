<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinop App</title>
  <script>
    // GitHub Pages SPA routing: redirect any deep path back to the root app
    var pathSegments = location.pathname.split('/');
    // Keep the repo name prefix (/Sinop) and redirect to root
    var repoBase = '/' + pathSegments[1];
    sessionStorage.setItem('spa_redirect', location.pathname + location.search + location.hash);
    window.location.replace(repoBase + '/');
  </script>
  <style>
    body { font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f2ff; }
    .box { text-align: center; }
    .logo { width: 56px; height: 56px; background: #4f46e5; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: white; margin: 0 auto 16px; }
    p { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">S</div>
    <p>Loading Sinop App...</p>
  </div>
</body>
</html>
